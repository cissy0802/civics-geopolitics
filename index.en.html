<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civics &amp; Geopolitics</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Noto Sans SC","Segoe UI",Roboto,sans-serif;background:#f4f6f8;color:#23303f;line-height:1.8}
.container{max-width:720px;margin:0 auto;padding:24px 20px 60px}
header{text-align:center;padding:56px 0 40px}
header h1{font-size:2rem;font-weight:800;color:#1f3a5f;letter-spacing:2px}
header p{margin-top:8px;font-size:1rem;color:#5a7184}
.list{margin-top:32px}
.entry{display:flex;align-items:baseline;gap:16px;padding:18px 20px;background:#fff;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,0.05);margin-bottom:14px;transition:transform 0.15s,box-shadow 0.15s;text-decoration:none;color:inherit}
.entry:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.1)}
.entry .day{flex-shrink:0;font-size:0.85rem;font-weight:700;color:#1f3a5f;font-variant-numeric:tabular-nums;min-width:56px}
.entry .title{font-size:1.05rem;font-weight:600;color:#23303f}
.entry .models{font-size:0.88rem;color:#5a7184;margin-left:auto;text-align:right}
footer{text-align:center;padding:40px 0 12px;font-size:0.82rem;color:#9fb0bf}
@media(max-width:600px){
  header h1{font-size:1.5rem}
  .entry{flex-direction:column;gap:4px}
  .entry .models{margin-left:0;text-align:left}
}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>Civics &amp; Geopolitics</h1>
  <p>How the world is governed and divided</p>
</header>
<div class="list">
</div>
<footer>Neutral, multi-perspective, no side-taking.</footer>
</div>
<script src="https://cissy0802.github.io/comments.js" defer></script>
<script src="https://cissy0802.github.io/search.js" defer></script>
<script src="https://cissy0802.github.io/index-button.js" defer></script>
<script src="i18n-tts.js" defer></script>
</body>
</html>
